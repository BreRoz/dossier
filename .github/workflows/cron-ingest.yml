name: Hourly Ingest

# Calls the production ingest endpoint on dealdossier.io once an hour.
# Replaces the Vercel daily cron — moved here because (a) the Vercel
# Hobby plan caps cron resolution at daily, (b) hourly ingestion lets
# fresh deals reach watchlist users within an hour instead of up to 24,
# and (c) GitHub Actions's 6-hour job timeout is well beyond anything
# the ingest could ever need.
#
# The endpoint itself still runs on Vercel with all the secrets it
# needs (OpenAI, Gmail OAuth, Supabase, Resend). This workflow only
# needs CRON_SECRET to authenticate the call.
#
# Manual trigger is enabled via workflow_dispatch — handy for ad-hoc
# runs or backfilling after a Vercel outage.

on:
  schedule:
    - cron: '0 * * * *'   # every hour, on the hour (UTC)
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      # Skip overlapping runs — if a previous hour's job is still going,
      # don't start a new one on top of it. The next hourly tick will
      # pick up where we left off (processed_emails table dedupes).
      group: hourly-ingest
      cancel-in-progress: false
    steps:
      - name: Trigger ingest on dealdossier.io
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "::error::CRON_SECRET secret is not set in this repository."
            exit 1
          fi

          response=$(curl -sS --max-time 320 \
            -w "\n---STATUS---\n%{http_code}\n" \
            -H "Authorization: Bearer $CRON_SECRET" \
            "https://dealdossier.io/api/cron/ingest")

          body=$(echo "$response" | sed -n '/^---STATUS---$/q;p')
          status=$(echo "$response" | sed -n '/^---STATUS---$/,$p' | tail -n 1)

          echo "HTTP $status"
          echo "Body: $body"

          if [ "$status" != "200" ]; then
            echo "::error::Ingest endpoint returned $status"
            exit 1
          fi
